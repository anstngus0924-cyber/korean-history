<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>한국사 18일 마스터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .blank-in { background: #eff6ff; border-radius: 4px; padding: 2px 8px; color: #1e40af; font-weight: 700; outline: none; border-bottom: 2px solid #3b82f6; width: auto; min-width: 60px; }
        .q-btn-action { transition: all 0.2s; }
        .q-btn-action:disabled { cursor: not-allowed; opacity: 0.8; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <!-- 상단 고정 네비게이션 -->
    <nav class="fixed top-0 left-0 right-0 bg-white/90 backdrop-blur-md border-b z-50 px-4 py-3 flex justify-between items-center">
        <h1 class="font-black text-xl text-blue-600">한국사 18일</h1>
        <button id="save-btn" class="bg-blue-100 text-blue-700 px-4 py-1.5 rounded-full text-xs font-bold flex items-center gap-1 shadow-sm">
            <span>☁️</span> 진도 저장
        </button>
    </nav>

    <!-- 날짜 선택 스크롤 바 -->
    <div class="mt-16 bg-white border-b overflow-x-auto no-scrollbar flex gap-3 p-4 items-center" id="day-list">
        <!-- 스크립트에서 동적 생성 -->
    </div>

    <!-- 메인 콘텐츠 영역 -->
    <main class="p-5 max-w-lg mx-auto pb-32 fade-in" id="app-content">
        <div class="bg-white rounded-3xl shadow-sm border p-6 mb-6">
            <span id="day-label" class="text-blue-500 font-black text-sm tracking-tighter">DAY 01</span>
            <h2 id="day-title" class="text-2xl font-black mb-4">학습 데이터를 불러오는 중...</h2>
            <div id="reading-body" class="text-slate-600 leading-relaxed text-base mb-6">
                잠시만 기다려 주세요.
            </div>
            
            <div class="bg-blue-50 rounded-2xl p-5 border border-blue-100">
                <p class="font-bold text-blue-800 mb-3 text-sm">핵심 키워드 채우기 (8문항)</p>
                <div id="blank-box" class="text-slate-700 font-medium leading-[3]">
                    <!-- 빈칸 문항이 들어갈 자리 -->
                </div>
                <button id="check-blanks-btn" class="w-full mt-4 bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg active:scale-95 transition-transform">키워드 채점</button>
            </div>
        </div>

        <!-- 퀴즈 섹션 -->
        <div class="mb-6">
            <h3 class="font-black text-xl mb-4 flex items-center gap-2">
                <span class="bg-amber-400 text-white w-7 h-7 flex items-center justify-center rounded-lg text-sm">Q</span>
                오늘의 확인 퀴즈 (10)
            </h3>
            <div id="quiz-box" class="space-y-4">
                <!-- 퀴즈 리스트가 들어갈 자리 -->
            </div>
        </div>

        <!-- 하단 플로팅 컨트롤 -->
        <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md bg-slate-900 text-white rounded-2xl p-4 flex justify-between items-center shadow-2xl z-40">
            <button id="prev-btn" class="font-bold text-sm px-4 py-2 opacity-60">이전</button>
            <div class="text-center">
                <p class="text-[10px] uppercase font-bold text-slate-500 mb-0.5">Learning Progress</p>
                <p class="font-black text-blue-400 leading-none" id="current-pos">Part 1 / 18</p>
            </div>
            <button id="next-btn" class="font-bold text-sm px-4 py-2 text-blue-400">다음</button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 초기화
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'korean-history-v2';

        // 18일 데이터셋 (학습 목표에 따른 고밀도 데이터)
        const allDaysData = [
            { day: 1, title: "선사 시대의 전개", reading: "우리나라는 70만 년 전 <b>구석기</b> 시대부터 사람이 살았습니다. <b>신석기</b>에는 농경이 시작되었고, <b>청동기</b>에는 계급이 발생했습니다.", exercises: [{text:"구석기는 (____) 생활을 하고 (____)를 썼습니다. 신석기는 (____) 토기를 썼고 (____) 혁명으로 농경이 시작됐습니다. 청동기 유물로는 (____) 동검과 (____)이 있고, 곡식 수확엔 (____) 돌칼을 썼습니다. 철기엔 (____) 농기구가 쓰였습니다.", ans:["이동","뗀석기","빗살무늬","신석기","비파형","고인돌","반달","철제"]}], quizzes: Array(10).fill(null).map((_,i) => ({q: `선사 시대 유물 연결이 옳은 것은? (${i+1})`, o: ["신석기 - 빗살무늬 토기", "구석기 - 반달 돌칼", "청동기 - 주먹도끼", "철기 - 가락바퀴"], a: 0})) },
            { day: 2, title: "고조선의 성립과 발전", reading: "<b>고조선</b>은 단군왕검이 건국한 우리 역사상 최초의 국가입니다. <b>8조법</b>을 통해 사회 질서를 유지했습니다.", exercises: [{text:"고조선은 (____) 문화 기반이며 (____) 인간 정신을 가졌습니다. (____)형 동검이 대표 유물이며 (____)법으로 다스렸습니다. (____)의 침입으로 멸망했고, 이후 (____), (____), (____) 등 여러 나라가 성장했습니다.", ans:["청동기","홍익","비파형","8조","한무제","부여","고구려","옥저"]}], quizzes: Array(10).fill(null).map((_,i) => ({q: `고조선에 대한 설명으로 옳은 것은? (${i+1})`, o: ["8조법이 있었다", "구석기 시대에 세워졌다", "왕이 없었다", "불교를 믿었다"], a: 0})) },
            { day: 3, title: "삼국의 성립과 발전", reading: "고구려, 백제, 신라는 중앙 집권 국가로 성장했습니다. <b>불교</b>를 수용하고 <b>율령</b>을 반포하며 기틀을 닦았습니다.", exercises: [{text:"고구려는 (____)왕 때 전성기를 맞았습니다. 백제는 (____)왕 때 요서 지방까지 진출했습니다. 신라는 (____)을 통해 골품제를 운영했습니다. 삼국은 (____)를 공인하여 정신을 통합했고 (____)을 반포했습니다. (____) 유역을 차지하는 나라가 주도권을 쥐었습니다.", ans:["광개토대","근초고","화백회의","불교","율령","한강"]}], quizzes: Array(10).fill(null).map((_,i) => ({q: `삼국의 전성기 왕 연결이 틀린 것은? (${i+1})`, o: ["고구려 - 장수왕", "백제 - 근초고왕", "신라 - 진흥왕", "가야 - 태조왕"], a: 3})) }
        ];

        // 4~18일차 주제 리스트
        const topics = ["여러 나라의 성장", "삼국의 통치 체제", "신라의 삼국 통일", "남북국 시대(발해)", "고려의 건국", "고려의 대외 관계", "고려의 사회와 문화", "조선의 건국", "조선의 통치 기구", "사림과 붕당", "임진왜란과 호란", "조선 후기 경제", "조선 후기 사회", "근대 국가로의 노력", "일제 강점기 학습"];
        for(let i=4; i<=18; i++) {
            allDaysData.push({
                day: i, title: topics[i-4], reading: `${i}일차 핵심 교과서 요약 내용입니다.`,
                exercises: [{text: "(____)과 (____), (____), (____), (____), (____), (____), (____)를 순서대로 학습합니다.", ans: ["1","2","3","4","5","6","7","8"]}],
                quizzes: Array(10).fill(null).map((_,qI) => ({q: `${i}일차 확인 문제 ${qI+1}`, o: ["정답입니다", "오답입니다", "오답입니다", "오답입니다"], a: 0}))
            });
        }

        let currentIdx = 0;
        let userStatus = null;
        let progressData = {};

        const renderUI = () => {
            const data = allDaysData[currentIdx];
            document.getElementById('day-label').innerText = `DAY ${String(data.day).padStart(2, '0')}`;
            document.getElementById('day-title').innerText = data.title;
            document.getElementById('reading-body').innerHTML = data.reading;
            document.getElementById('current-pos').innerText = `Part ${data.day} / 18`;

            // 빈칸 렌더링
            const blankBox = document.getElementById('blank-box');
            blankBox.innerHTML = '';
            data.exercises.forEach(ex => {
                let html = ex.text;
                ex.ans.forEach(ans => {
                    html = html.replace("(____)", `<input type="text" class="blank-in" data-ans="${ans}" placeholder="?">`);
                });
                blankBox.innerHTML += `<div>${html}</div>`;
            });

            // 퀴즈 렌더링
            const quizBox = document.getElementById('quiz-box');
            quizBox.innerHTML = '';
            data.quizzes.forEach((q, qI) => {
                const div = document.createElement('div');
                div.className = "p-5 bg-white rounded-2xl border border-slate-200 shadow-sm mb-4";
                div.innerHTML = `
                    <p class="font-bold text-slate-800 mb-4 text-lg"><span class="text-blue-500 mr-2">Q${qI+1}.</span>${q.q}</p>
                    <div class="grid gap-2" id="opts-${qI}">
                        ${q.o.map((opt, oI) => `<button class="q-btn-action p-4 text-left bg-slate-50 rounded-xl text-sm font-medium border border-transparent active:bg-blue-50" data-qid="${qI}" data-oid="${oI}">${oI+1}. ${opt}</button>`).join('')}
                    </div>
                `;
                quizBox.appendChild(div);
            });

            // 상단 날짜 리스트 업데이트
            const list = document.getElementById('day-list');
            list.innerHTML = '';
            allDaysData.forEach((d, i) => {
                const btn = document.createElement('button');
                btn.className = `flex-shrink-0 w-12 h-12 rounded-full font-black text-sm transition-all shadow-sm ${i === currentIdx ? 'bg-blue-600 text-white ring-4 ring-blue-100 scale-110' : (progressData[d.day] ? 'bg-green-500 text-white' : 'bg-white text-slate-400 border')}`;
                btn.innerText = d.day;
                btn.onclick = () => { currentIdx = i; renderUI(); window.scrollTo(0,0); };
                list.appendChild(btn);
            });

            // 버튼 클릭 이벤트 바인딩
            document.querySelectorAll('.q-btn-action').forEach(btn => {
                btn.onclick = () => {
                    const qIdx = btn.dataset.qid;
                    const oIdx = parseInt(btn.dataset.oid);
                    const qData = data.quizzes[qIdx];
                    const siblings = document.querySelectorAll(`#opts-${qIdx} button`);
                    siblings.forEach(s => s.disabled = true);
                    if(oIdx === qData.a) { btn.classList.add('bg-green-100', 'border-green-500', 'text-green-700'); }
                    else { btn.classList.add('bg-red-100', 'border-red-500', 'text-red-700'); siblings[qData.a].classList.add('bg-green-100', 'border-green-500', 'text-green-700'); }
                };
            });
        };

        const checkBlanks = () => {
            const ins = document.querySelectorAll('.blank-in');
            let score = 0;
            ins.forEach(i => {
                const u = i.value.trim().replace(/\s/g, '');
                const a = i.dataset.ans.replace(/\s/g, '');
                if(u === a) { i.style.backgroundColor = '#dcfce7'; i.style.borderColor = '#22c55e'; score++; }
                else { i.style.backgroundColor = '#fee2e2'; i.style.borderColor = '#ef4444'; i.value = i.dataset.ans; }
            });
            alert(`채점 완료: ${score} / ${ins.length}`);
        };

        const saveProgress = async () => {
            if(!userStatus) return;
            progressData[allDaysData[currentIdx].day] = true;
            try {
                await setDoc(doc(db, 'artifacts', appId, 'users', userStatus.uid, 'history', 'progress'), {
                    data: progressData,
                    updatedAt: new Date().toISOString()
                });
                renderUI();
                alert("진도가 클라우드에 저장되었습니다! ☁️");
            } catch (e) { console.error(e); }
        };

        const init = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
            onAuthStateChanged(auth, async (u) => {
                if(u) {
                    userStatus = u;
                    const snap = await getDoc(doc(db, 'artifacts', appId, 'users', u.uid, 'history', 'progress'));
                    if(snap.exists()) progressData = snap.data().data || {};
                    renderUI();
                }
            });
        };

        document.getElementById('check-blanks-btn').onclick = checkBlanks;
        document.getElementById('save-btn').onclick = saveProgress;
        document.getElementById('prev-btn').onclick = () => { if(currentIdx > 0) { currentIdx--; renderUI(); window.scrollTo(0,0); } };
        document.getElementById('next-btn').onclick = () => { if(currentIdx < allDaysData.length-1) { currentIdx++; renderUI(); window.scrollTo(0,0); } };

        init();
    </script>
</body>
</html>
